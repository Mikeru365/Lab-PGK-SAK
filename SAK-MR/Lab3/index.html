<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firework Show</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
        }
        canvas { 
            display: block; 
        }
        #Sliders {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="Sliders">
        <label>Grawitacja: <input type="range" id="gravityRange" min="0" max="1" step="0.05" value="0.2"></label>
        <br>
        <label>Cząsteczki: <input type="range" id="particleRange" min="10" max="300" step="10" value="100"></label>
    </div>

    <canvas id="fireworkCanvas"></canvas>
    <script src="Particle.js"></script>
    <script src="Firework.js"></script>
    <script src="FireworkShow.js"></script>
</body>
</html>
